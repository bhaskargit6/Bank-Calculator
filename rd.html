<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RD Calculator</title>

<link rel="stylesheet" href="style/style.css">
<style>
@media (min-width: 768px){

    .section{
        display: flex;
        flex-direction: row;
        align-items: stretch;
        gap: 24px;
    }

    .section .surface{
        flex: 1;
        min-width: 0; /* IMPORTANT for overflow fix */
    }

}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <span class="back" onclick="goBack()">←</span>
    RD Calculator
</div>

<div class="section">

<!-- =========================
     INPUT CARD
========================= -->
<div class="surface">

<div class="header-row">
    <div>
        <div class="title">Recurring Deposit</div>
        <div class="subtitle">Monthly Investment Growth</div>
    </div>
    <div class="chip" id="rateDisplay">--</div>
</div>

<!-- MONTHLY DEPOSIT -->
<label>Monthly Deposit (₹)</label>
<input id="monthly" type="number" placeholder="e.g. 2000">

<!-- SENIOR -->
<label>Senior Citizen</label>
<div class="segmented">
    <button id="seniorNo" class="seg active" onclick="setSenior('no')">No</button>
    <button id="seniorYes" class="seg" onclick="setSenior('yes')">Yes</button>
</div>

<!-- DURATION -->
<label>Duration</label>
<div class="row">
<input id="duration" type="number" placeholder="e.g. 365">
<select id="unit">
    <option value="days">Days</option>
    <option value="months">Months</option>
    <option value="years">Years</option>
</select> 
<div class="input-select" onclick="openUnit()">
    <span id="unitText">Days</span>
    <svg viewBox="0 0 24 24">
        <path d="M7 10l5 5 5-5z"></path>
    </svg></div>
</div>

<!-- STAFF -->
<label>Staff of WBGB</label>
<div class="segmented">
    <button id="staffNo" class="seg active" onclick="setStaff('no')">No</button>
    <button id="staffYes" class="seg" onclick="setStaff('yes')">Yes</button>
</div>

<!-- =========================
     PAN SECTION
========================= -->
    <label>PAN Available in CBS</label>
    <div class="segmented">
        <button id="panYes" class="seg active" onclick="setPAN('yes')">Yes</button>
        <button id="panNo" class="seg" onclick="setPAN('no')">No</button>
    </div>

<!-- BUTTONS -->
<div class="btn-group">
    <button class="btn outline" onclick="resetRD()">Reset</button>
    <button class="btn primary" onclick="calculateRD()">Calculate</button>
</div>

</div>

<!-- =========================
     RESULT CARD
========================= -->
<div class="surface">

<div class="title"></div>

<div id="result">

    <div class="result-line">
        <span>Total Deposit</span>
        <span>--</span>
    </div>

    <div class="result-line">
        <span>Maturity Amount</span>
        <span>--</span>
    </div>

    <div class="result-line">
        <span>Total Interest</span>
        <span>--</span>
    </div>

</div>

</div>

</div>
<!-- MODAL -->
    
<div id="unitModal" class="modal">
<div class="modal-box">
    
<div class="option active" onclick="selectUnit('days','Days',this)">
<div class="icon">
<svg viewBox="0 0 24 24">
<path d="M9 16.2l-3.5-3.5L4 14.2 9 19l12-12-1.5-1.5z"/></svg></div>Days</div>

<div class="option" onclick="selectUnit('months','Months',this)">
<div class="icon"><svg viewBox="0 0 24 24"><path d="M9 16.2l-3.5-3.5L4 14.2 9 19l12-12-1.5-1.5z"/></svg></div>Months</div>

<div class="option" onclick="selectUnit('years','Years',this)">
<div class="icon"><svg viewBox="0 0 24 24"><path d="M9 16.2l-3.5-3.5L4 14.2 9 19l12-12-1.5-1.5z"/></svg></div>Years</div>
    
</div></div>

<!-- ERROR -->
<div id="snackbar"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
<script src="script/rates.js"></script>
<script src="script/script.js"></script>

</body>
</html>
