<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback</title>

<link rel="stylesheet" href="style/style.css">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
textarea{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:1.5px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
    font-size: 15px;
    margin-top:6px;
    resize:none;
}
textarea:focus{
    outline:none;
    border:1.5px solid var(--primary);
}
</style>
</head>

<body>

<div class="topbar">
    <span class="back" onclick="goBack()">←</span>
    Feedback
</div>

<div class="section">
<div class="surface">

<div class="header-row">
    <div>
        <div class="title">Send Feedback</div>
        <div class="subtitle">Help improve this app</div>
    </div>
</div>

<label>Name</label>
<input id="name" type="text" placeholder="Your name">

<label>Email (optional)</label>
<input id="email" type="email" placeholder="Your email">

<label>Title</label>
<input id="title" type="text" placeholder="Short summary">

<label>Description</label>
<textarea id="desc" rows="5" placeholder="Write your feedback..."></textarea>

<div class="btn-group">
    <button class="btn outline" onclick="resetForm()">Reset</button>
    <button class="btn primary" onclick="sendFeedback()">Send</button>
</div>

</div>
</div>

<div id="snackbar"></div>

<script>
// ======================
// INIT EMAILJS
// ======================
(function(){
    emailjs.init("sivgbqx0Tjnz6L09L");
})();

// ======================
// SEND FEEDBACK
// ======================
function sendFeedback(){

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let title = document.getElementById("title").value.trim();
    let desc = document.getElementById("desc").value.trim();

    if(!name || !title || !desc){
        showSnack("Fill all required fields");
        return;
    }

    emailjs.send(
        "service_0o3s1lm",
        "template_ey88ujq",
        {
            name: name,
            email: email || "no-reply@test.com",
            title: title,
            message: desc
        }
    )
    .then(function(){
        showSnack("Feedback sent successfully ✅");
        resetForm();
    })
    .catch(function(err){
        console.log("EmailJS Error:", err);
        showSnack("Failed to send ❌");
    });
}

// ======================
// RESET
// ======================
function resetForm(){
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
}

// ======================
// SNACKBAR
// ======================
function showSnack(msg){
    let bar = document.getElementById("snackbar");
    if(!bar) return;

    bar.innerText = msg;
    bar.classList.add("show");

    setTimeout(()=>{
        bar.classList.remove("show");
    },2500);
}

// ======================
// BACK
// ======================
function goBack(){
    history.length > 1 ? history.back() : location.href="index.html";
}
</script>

</body>
</html>
